<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <style>
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
    .m-path {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw 2s ease forwards, float 3s ease-in-out infinite;
      transform-origin: center;
    }
    .care-dot {
      animation: pulse 2s ease-in-out infinite;
      transform-origin: 20px 12px;
    }
  </style>
  <!-- Stylized Skeleton "M" -->
  <path class="m-path" d="M10 28V14C10 12.8954 10.8954 12 12 12H15C16.1046 12 17 12.8954 17 14V22L20 18L23 22V14C23 12.8954 23.8954 12 25 12H28C29.1046 12 30 12.8954 30 14V28" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Animated Care Dot -->
  <circle class="care-dot" cx="20" cy="12" r="3" fill="#D63384"/>
</svg>
